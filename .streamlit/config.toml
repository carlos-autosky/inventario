[theme]
# Paleta alineada con DashboardCxC — AUTOSKY DESIGN SYSTEM Light v1.3
# Sky Blue corporativo · fondo blanco · superficie blanca.
# App es light-only por diseño — Streamlit 1.56 no expone CSS vars del
# theme con nombres consultables, lo que impide hacer dark coherente
# en bloques HTML inline. Ver memory/project_tema_polish_pendiente.md.
base = "light"
primaryColor = "#0078b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans serif"

[client]
# Asegura que el menu hamburguesa y toolbar con la opcion de tema esten visibles.
toolbarMode = "auto"

[browser]
gatherUsageStats = false

[server]
headless = true
enableXsrfProtection = false
enableCORS = false
# Servir archivos desde ./static/ en http://<host>:<port>/app/static/<file>
# Usado por la pestaña Exportar Portal para exponer stock_portal.csv a
# servicios web externos que lo consumen por HTTP GET.
enableStaticServing = true
