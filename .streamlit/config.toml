[theme]
# Paleta alineada con DashboardCxC — AUTOSKY DESIGN SYSTEM Light v1.3
# Sky Blue corporativo · fondo blanco · superficie blanca
base = "light"
primaryColor = "#0078b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans serif"

[theme.dark]
# Variante dark — habilita el switcher nativo (hamburguesa → Settings →
# Choose app theme). Mismo color primario, fondo slate, texto casi blanco.
base = "dark"
primaryColor = "#00a0dc"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#f1f5f9"
font = "sans serif"

[client]
# Asegura que el menu hamburguesa y toolbar con la opcion de tema esten visibles.
toolbarMode = "auto"

[browser]
gatherUsageStats = false

[server]
headless = true
enableXsrfProtection = false
enableCORS = false
# Servir archivos desde ./static/ en http://<host>:<port>/app/static/<file>
# Usado por la pestaña Exportar Portal para exponer stock_portal.csv a
# servicios web externos que lo consumen por HTTP GET.
enableStaticServing = true
