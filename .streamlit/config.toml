[theme]
base = "light"
primaryColor = "#0ea5e9"
backgroundColor = "#f0f9ff"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless = true
enableXsrfProtection = false
enableCORS = false
# Servir archivos desde ./static/ en http://<host>:<port>/app/static/<file>
# Usado por la pestaña Exportar Portal para exponer stock_portal.csv a
# servicios web externos que lo consumen por HTTP GET.
enableStaticServing = true
